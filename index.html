<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星辰</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">

  <script src="js/script.js"></script>

  <!--搜索框抖动效果-->
  <script>
    function search() {
      var searchBox = document.getElementById("search-input");
      var searchTerm = searchBox.value;

      if (searchTerm === "") {
        searchBox.classList.add("shake");
        searchBox.addEventListener("animationend", function () {
          searchBox.classList.remove("shake");
        }, { once: true });
      } else {
        // 执行搜索操作
      }
    }

  </script>
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe"
    crossorigin="anonymous"></script>

  <!--搜索框-->
  <div class="d-flex justify-content-center">
    <div class="search-container col-6">
      <div class="input-group mb-3">
        <input type="text" class="form-control" id="search-input" style="background-color: rgba(255, 255, 255, 0.4);"
          placeholder="Google" aria-label="Google" aria-describedby="button-addon2">
        <button onclick="search()" class="btn btn-primary" type="button" id="search-button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search"
            viewBox="0 0 16 16">
            <path
              d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
          </svg>
          搜索
        </button>
      </div>
    </div>
  </div>

  <script>
    const searchButton = document.querySelector('#search-button');
    const searchInput = document.querySelector('#search-input');

    searchButton.addEventListener('click', () => {
      const searchTerm = searchInput.value.trim();
      if (searchTerm) {
        const searchUrl = `https://www.google.com/search?q=${encodeURIComponent(searchTerm)}`;
        window.open(searchUrl, '_blank');
      }
    });
  </script>

  <!--内容-->
  <div id="main" style="background-color: rgba(255, 255, 255, 0.1);"><!--调整透明色-->
    <!--选项卡-->
    <div class="buttons">
      <button type="button" class="anniu" onclick="showDiv('div1')"><svg xmlns="http://www.w3.org/2000/svg" width="16"
          height="16" fill="currentColor" class="bi bi-robot" viewBox="0 0 16 16">
          <path
            d="M8.5 1.866a1 1 0 1 0-1 0V3h-2A4.5 4.5 0 0 0 1 7.5V8a1 1 0 0 0-1 1v2a1 1 0 0 0 1 1v1a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-1a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1v-.5A4.5 4.5 0 0 0 10.5 3h-2V1.866ZM14 7.5V13a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V7.5A3.5 3.5 0 0 1 5.5 4h5A3.5 3.5 0 0 1 14 7.5Z">
          </path>
        </svg>
        大语言模型
      </button>


      <button type="button" class="anniu" onclick="showDiv('div2')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-image"
          viewBox="0 0 16 16">
          <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z" />
          <path
            d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2h-12zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z" />
        </svg>
        AI绘图</button>
      <button type="button" class="anniu" onclick="showDiv('div3')">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-megaphone"
          viewBox="0 0 16 16">
          <path
            d="M13 2.5a1.5 1.5 0 0 1 3 0v11a1.5 1.5 0 0 1-3 0v-.214c-2.162-1.241-4.49-1.843-6.912-2.083l.405 2.712A1 1 0 0 1 5.51 15.1h-.548a1 1 0 0 1-.916-.599l-1.85-3.49a68.14 68.14 0 0 0-.202-.003A2.014 2.014 0 0 1 0 9V7a2.02 2.02 0 0 1 1.992-2.013 74.663 74.663 0 0 0 2.483-.075c3.043-.154 6.148-.849 8.525-2.199V2.5zm1 0v11a.5.5 0 0 0 1 0v-11a.5.5 0 0 0-1 0zm-1 1.35c-2.344 1.205-5.209 1.842-8 2.033v4.233c.18.01.359.022.537.036 2.568.189 5.093.744 7.463 1.993V3.85zm-9 6.215v-4.13a95.09 95.09 0 0 1-1.992.052A1.02 1.02 0 0 0 1 7v2c0 .55.448 1.002 1.006 1.009A60.49 60.49 0 0 1 4 10.065zm-.657.975 1.609 3.037.01.024h.548l-.002-.014-.443-2.966a68.019 68.019 0 0 0-1.722-.082z" />
        </svg>
        AI声音</button>
    </div>
    <!--选项卡结束-->
  <!-- 这里是第一个div的内容 -->
    <div id="div1">
      <ul class="list-group list-group-horizontal">
        <li class="list-group-item">
          <img src="images/ico/chatgpt.png" width="42" height="42">
          <a href="https://chat.openai.com/" target="_blank">ChatGPT</a>
          <!-- <p class="mb-0 opacity-75">大语言模型</p>-->
        </li>


        <li class="list-group-item">
          <a href="https://yiyan.baidu.com/" target="_blank">
            <img src="images/ico/baidu.ico" width="42" height="42">
            文言一心
          </a>

        </li>

        <li class="list-group-item">
          <a href="https://bard.google.com/" target="_blank">
            <img src="https://www.gstatic.com/lamda/images/favicon_v1_150160cddff7f294ce30.svg" width="42" height="42">
            Google Bard
          </a>
        </li>

        <li class="list-group-item">
          <a href="https://tongyi.aliyun.com/" target="_blank">
            <img src="./images/ico/ali.jpg" width="42" height="42">
            通义千问
          </a>
        </li>


        <li class="list-group-item">
          <a href="https://tongyi.aliyun.com/" target="_blank">
            <img src="./images/ico/ali.jpg" width="42" height="42">
            通义千问11
          </a>
        </li>

        



      </ul>

    </div>

    <div id="div2" style="display:none">
      <!-- 这里是第二个div的内容 -->

      <ul class="list-group list-group-horizontal">
        <!--Mj绘图-->
        <li class="list-group-item">
          <img src="images/ico/Midjourney_Emblem.png" width="42" height="42">
          <a href="https://www.midjourney.com/" target="_blank">Midjourney</a>

        </li>

        <li class="list-group-item">
          <a href="https://yiyan.baidu.com/" target="_blank">
            <img src="images/ico/baidu.ico" width="42" height="42">
            文言一心
          </a>
        </li>


      </ul>

    </div>
    <!-- 结束DIV2 -->



    <div id="div3" style="display:none">
      <!-- 这里是第三个div的内容 -->
    </div>

    <script>
      function showDiv(divId) {
        // 隐藏所有div
        document.querySelectorAll('[id^="div"]').forEach(div => div.style.display = "none");
        // 显示选中的div
        document.getElementById(divId).style.display = "block";
      }
    </script>
  </div>
</body>
</html>
